# Build settings
permalink: /blog/:year/:title/
markdown: kramdown
highlighter: rouge
plugins: [jekyll-paginate-v2, jekyll-seo-tag]

# Asset cache bust format used to render build-time timestamps for assets
# Format follows Liquid/Jekyll `date` filter formats (Ruby strftime).
asset_cache_bust_format: "%Y%m%d%H%M%S"

pagination:
  enabled: true
  per_page: 3
  permalink: "/page/:num/"

# Site language (en-US default)
lang: en-US

comments: true

source: source
destination: _site
sass:
  sass_dir: _sass
  style: compressed # expanded

# SEO settings
title: end2end
tagline: Clean Jekyll theme
description: "A free Jekyll theme for download"
keywords: "Jekyll, theme, free, download, SEO, blog, web"
url: https://matheus-vieira.github.io
baseurl: "/end2end-jekyll-theme"
repo: https://github.com/matheus-vieira/end2end-jekyll-theme
twitter:
