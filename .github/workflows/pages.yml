name: Deploy Jekyll site to Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        env:
          JEKYLL_ENV: production
          CONFIG_VARS: |
            GA_MEASUREMENT_ID=${{ vars.GA_MEASUREMENT_ID }}
            GA_OPTIONS=${{ vars.GA_OPTIONS }}
          TZ: America/Sao_Paulo
        run: |
          # create a temporary config file from repo vars
          : > _config.env.vars.yml
          printf '%s\n' "${CONFIG_VARS}" | while IFS='=' read -r var value; do
            [ -n "${var}" ] || continue

            yaml_key=$(printf '%s' "${var}" | tr '[:upper:]' '[:lower:]')
            yaml_value=$(printf '%s' "${value}" | sed 's/\\/\\\\/g; s/"/\\"/g')
            printf '%s: "%s"\n' "${yaml_key}" "${yaml_value}" >> _config.env.vars.yml
          done
          bundle exec jekyll build --config _config.yml,_config.env.vars.yml

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
