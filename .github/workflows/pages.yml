name: Deploy Jekyll site to Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Generate asset hashes
        # Rebuild the generated Sass partial and cache-busting hashes before Jekyll runs.
        run: bundle exec rake assets:hashes

      - name: Generate secrets config
        env:
          GA_MEASUREMENT_ID: ${{ secrets.GA_MEASUREMENT_ID }}
          GA_OPTIONS: ${{ secrets.GA_OPTIONS }}
        # Validate the optional secrets one by one so invalid values are skipped with warnings.
        run: bundle exec rake config:secrets

      - name: Build with Jekyll
        env:
          JEKYLL_ENV: production
          TZ: America/Sao_Paulo
        run: |
          bundle exec jekyll build --config _config.yml,_config.assets.yml,_config.secrets.yml

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
