name: Deploy Jekyll site to Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        env:
          JEKYLL_ENV: production
          TZ: America/Sao_Paulo
          CONFIG_VARS: |
            ga_measurement_id: "${{ secrets.GA_MEASUREMENT_ID }}"
            ga_options:
            ${{ secrets.GA_OPTIONS }}
        run: |
          main_css_source="source/css/main.scss" # adjust if the real source file is different
          fonts_css_source="source/css/fonts.css"
          end2end_woff2_source="source/fonts/end2end.woff2"
          end2end_ttf_source="source/fonts/end2end.ttf"

          main_css_hash="$(sha256sum "$main_css_source" | awk '{print $1}')"
          fonts_css_hash="$(sha256sum "$fonts_css_source" | awk '{print $1}')"
          end2end_woff2_hash="$(sha256sum "$end2end_woff2_source" | awk '{print $1}')"
          end2end_ttf_hash="$(sha256sum "$end2end_ttf_source" | awk '{print $1}')"

          {
            printf '%s\n' "${CONFIG_VARS}"
            printf 'asset_hash_main_css: "%s"\n' "${main_css_hash}"
            printf 'asset_hash_fonts_css: "%s"\n' "${fonts_css_hash}"
            printf 'asset_hash_end2end_woff2: "%s"\n' "${end2end_woff2_hash}"
            printf 'asset_hash_end2end_ttf: "%s"\n' "${end2end_ttf_hash}"
          } > _config.secrets.yml

          bundle exec jekyll build --config _config.yml,_config.secrets.yml

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
