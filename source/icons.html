layout: page
title: Icons fonts
permalink: /icons/
---

<style>
  .icondemo {
    margin: 0;
    padding: 0;
    list-style: none;
    text-align: center;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(8rem, 1fr));
    gap: 10px;
  }
  .icondemo__item {
    display: flex;
  }
  .icondemo__inner {
    width: 100%;
    padding: 15px 10px;
    border-radius: 6px;
  }
  .icondemo__item .icon {
    display: inline-block;
    font-size: 2rem;
    margin-bottom: 10px;
    transition: transform .12s linear;
  }
  .icondemo__item:hover .icon {
    transform: scale(1.4)
  }
  .icondemo__item code {
    display: block;
    overflow-wrap: break-word;
    word-break: normal;
  }
</style>

<ul class="icondemo">
  {% for icon in site.data._icons %}
    <li class="icondemo__item">
      <div class="icondemo__inner">
        <i class="icon icon-{{ icon.name }}"></i>
        <code>{{ icon.name }}</code>
      </div>
    </li>
  {% endfor %}
</ul>
