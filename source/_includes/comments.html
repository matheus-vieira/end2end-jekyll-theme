{% if page.comments and site.comments != false %}
<hr>

{%- assign provider = site.comments.provider | default: 'giscus' -%}
<aside id="comments" class="comments {{ provider }}">
  <h3><i class="icon icon-comments-o"></i> Comments</h3>
  <div id="comments-container"></div>

  <template id="comments-template-giscus">{% include comments/giscus.html %}</template>
  <template id="comments-template-disqus">{% include comments/disqus.html %}</template>

  <script>
    (function() {
      var provider = '{{ provider }}';
      var observed = false;
      function executeScripts(container) {
        var scripts = container.querySelectorAll('script');
        scripts.forEach(function(oldScript) {
          var newScript = document.createElement('script');
          for (var i = 0; i < oldScript.attributes.length; i++) {
            var attr = oldScript.attributes[i];
            newScript.setAttribute(attr.name, attr.value);
          }
          newScript.text = oldScript.innerHTML;
          oldScript.parentNode.replaceChild(newScript, oldScript);
        });
      }

      function loadComments() {
        if (observed) return;
        observed = true;
        var container = document.getElementById('comments-container');
        var tpl = document.getElementById('comments-template-' + provider);
        if (!tpl || !container) return;
        var node = tpl.content.cloneNode(true);
        container.appendChild(node);
        executeScripts(container);
      }

      if ('IntersectionObserver' in window) {
        var io = new IntersectionObserver(function(entries, obs) {
          entries.forEach(function(entry) {
            if (entry.isIntersecting) {
              loadComments();
              obs.disconnect();
            }
          });
        }, { rootMargin: '200px' });
        var el = document.getElementById('comments');
        if (el) io.observe(el);
      } else {
        // Fallback: load immediately
        loadComments();
      }
    })();
  </script>
</aside>
{% endif %}
